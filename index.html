<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WeedEats • Uber Eats Style (Pretoria)</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin:0; font-family:system-ui; background:#111; color:#fff; }
    h1 { background:#000; color:#0f0; text-align:center; padding:15px; margin:0; font-size:22px; }
    nav { position:fixed; bottom:0; width:100%; display:flex; background:#1a1a1a; z-index:100; }
    nav button { flex:1; padding:14px 6px; background:none; border:none; color:#0f0; font-size:12px; }
    .tab { display:none; padding:15px; padding-bottom:80px; }
    .active { display:block; }
    .card { background:#222; border-radius:12px; padding:12px; margin:10px 0; }
    input { width:100%; padding:14px; background:#333; color:#fff; border:none; border-radius:8px; }
    canvas { display:block; margin:15px auto; border:3px solid #0f0; background:#000; max-width:100%; }
    button { border-radius:8px; padding:12px; }
  </style>
</head>
<body>
  <h1>🍔 WeedEats • Uber Eats Style</h1>

  <!-- Discover Tab -->
  <div id="discover" class="tab active">
    <input type="text" id="search" placeholder="🔎 Search restaurants, KFC, weed, gummies..." onkeyup="filterItems()">
    <div style="margin:10px 0;">
      <button onclick="toggleCategory('all')" style="background:#0a0;color:#000;">All</button>
      <button onclick="toggleCategory('food')" style="background:#333;">🍔 Food</button>
      <button onclick="toggleCategory('weed')" style="background:#060;">🌿 Weed</button>
    </div>
    <div id="map" style="height:260px; border-radius:12px;"></div>
    <h3>🔥 Popular in Pretoria</h3>
    <div id="list"></div>
  </div>

  <!-- Menu + Cart Tab -->
  <div id="menu" class="tab">
    <h2 id="selected-name"></h2>
    <div id="product-list"></div>
    <div class="card">
      <h3>🛒 Cart (<span id="cart-count">0</span>)</h3>
      <div id="cart-items"></div>
      <p>Total: R<span id="cart-total">0</span></p>
      <button onclick="checkout()" style="width:100%; background:#0a0; color:#000; font-weight:bold;">Checkout • Order Now</button>
    </div>
  </div>

  <!-- Games Tab -->
  <div id="games" class="tab">
    <h2>🎮 Mini Games Hub</h2>
    <button onclick="showGame('brick')" style="width:100%;margin:8px 0;background:#222;">🧱 Brick Breaker</button>
    <button onclick="showGame('runner')" style="width:100%;margin:8px 0;background:#222;">🏃 Subway Runner</button>
    <button onclick="showGame('puzzle')" style="width:100%;margin:8px 0;background:#222;">🧩 Memory Match Puzzle</button>
    <button onclick="showGame('word')" style="width:100%;margin:8px 0;background:#222;">📝 Missing Word</button>
    <div id="gameContainer" style="margin-top:20px;"></div>
  </div>

  <!-- Life Sim Tab -->
  <div id="life" class="tab">
    <h2>🧬 Gangster or Corporate Life Sim</h2>
    <div id="status" class="card"></div>
    <button onclick="choosePath('gangster')" style="width:100%;margin:8px 0;background:#222;">🚨 Join the Streets (Gangster)</button>
    <button onclick="choosePath('corporate')" style="width:100%;margin:8px 0;background:#222;">📚 Corporate Grind</button>
    <button onclick="randomEvent()" style="width:100%;margin:8px 0;background:#f80;">⏳ Next Day (Police & Judge)</button>
    <div id="inventory" class="card"></div>
  </div>

  <nav>
    <button onclick="switchTab(0)">🏠 Discover</button>
    <button onclick="switchTab(1)">🛍️ Menu</button>
    <button onclick="switchTab(2)">🎮 Games</button>
    <button onclick="switchTab(3)">🧬 Life</button>
  </nav>
