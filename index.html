<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WeedEats</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin:0; font-family:system-ui; background:#111; color:#fff; }
    h1 { background:#000; color:#0f0; text-align:center; padding:15px; margin:0; font-size:22px; }
    nav { position:fixed; bottom:0; width:100%; display:flex; background:#1a1a1a; z-index:100; }
    nav button { flex:1; padding:14px 6px; background:none; border:none; color:#0f0; font-size:12px; }
    .tab { display:none; padding:15px; padding-bottom:80px; }
    .active { display:block; }
    .card { background:#222; border-radius:12px; padding:12px; margin:10px 0; }
    input { width:100%; padding:14px; background:#333; color:#fff; border:none; border-radius:8px; }
    canvas { display:block; margin:15px auto; border:3px solid #0f0; background:#000; max-width:100%; }
    button { border-radius:8px; padding:12px; }
  </style>
</head>
<body>
  <h1>🍔 WeedEats </h1>

  <!-- Tab 0: Discover (Home like Uber Eats) -->
  <div id="discover" class="tab active">
    <input type="text" id="search" placeholder="🔎 Search restaurants, food or weed..." onkeyup="filterItems()">
    <div style="margin:10px 0;">
      <button onclick="toggleCategory('all')" style="background:#0a0;color:#000;">All</button>
      <button onclick="toggleCategory('food')" style="background:#333;">Food</button>
      <button onclick="toggleCategory('weed')" style="background:#060;">🌿 Weed</button>
    </div>
    <div id="map" style="height:260px; border-radius:12px;"></div>
    <h3>🔥 Popular near you</h3>
    <div id="list"></div>
  </div>

  <!-- Tab 1: Menu + Cart -->
  <div id="menu" class="tab">
    <h2 id="selected-name"></h2>
    <div id="product-list"></div>
    <div class="card">
      <h3>🛒 Cart (<span id="cart-count">0</span>)</h3>
      <div id="cart-items"></div>
      <p>Total: R<span id="cart-total">0</span></p>
      <button onclick="checkout()" style="width:100%; background:#0a0; color:#000; font-weight:bold;">Checkout • Order Now</button>
    </div>
  </div>

  <!-- Tab 2: Games -->
  <div id="games" class="tab">
    <h2>🎮 Mini Games</h2>
    <button onclick="showGame('brick')" style="width:100%;margin:8px 0;background:#222;">🧱 Brick Breaker</button>
    <button onclick="showGame('runner')" style="width:100%;margin:8px 0;background:#222;">🏃 Subway Runner</button>
    <button onclick="showGame('word')" style="width:100%;margin:8px 0;background:#222;">📝 Missing Word</button>
    <div id="gameContainer"></div>
  </div>

  <!-- Tab 3: Life Sim -->
  <div id="life" class="tab">
    <h2>🧬 Street vs Corporate Life Sim</h2>
    <div id="status" class="card"></div>
    <button onclick="choosePath('gangster')" style="width:100%;margin:8px 0;background:#222;">🚨 Join the Streets (Gangster)</button>
    <button onclick="choosePath('corporate')" style="width:100%;margin:8px 0;background:#222;">📚 Corporate Grind</button>
    <button onclick="randomEvent()" style="width:100%;margin:8px 0;background:#f80;">⏳ Next Day (Police/Judge Events)</button>
    <div id="inventory" class="card"></div>
  </div>

  <nav>
    <button onclick="switchTab(0)">🏠 Discover</button>
    <button onclick="switchTab(1)">🛍️ Menu</button>
    <button onclick="switchTab(2)">🎮 Games</button>
    <button onclick="switchTab(3)">🧬 Life</button>
  </nav>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); tg.ready(); tg.setHeaderColor("#000");

    let player = JSON.parse(localStorage.getItem('player')) || {path:null, money:1000, level:1, rep:60, inventory:[]};
    let cart = [];
    let currentPlace = null;
    let currentCategory = 'all';

    // Mock data: Normal food + Weed as plus
    const places = [
      {id:1, type:'food', name:"McDonalds Pretoria", lat:-25.746, lng:28.188, time:"15 min", rating:4.8,
       products:[{id:11,name:"Big Mac",price:89,desc:"Classic burger",img:"https://picsum.photos/200?food1"}]},
      {id:2, type:'food', name:"KFC Hatfield", lat:-25.75, lng:28.19, time:"20 min", rating:4.6,
       products:[{id:21,name:"Bucket Meal",price:199,desc:"Family size",img:"https://picsum.photos/200?food2"}]},
      {id:3, type:'weed', name:"Green Leaf Co", lat:-25.7461, lng:28.1885, time:"12 min", rating:4.9,
       products:[{id:31,name:"OG Kush Flower",price:280,desc:"Premium",img:"https://picsum.photos/200?weed1"},
                 {id:32,name:"THC Gummies",price:160,desc:"Edibles",img:"https://picsum.photos/200?weed2"}]},
      {id:4, type:'weed', name:"High Street Buds", lat:-25.755, lng:28.20, time:"18 min", rating:4.7,
       products:[{id:41,name:"Blue Dream",price:320,desc:"Hybrid",img:"https://picsum.photos/200?weed3"}]}
    ];

    let map;
    function initMap() {
      map = L.map('map').setView([-25.75, 28.19], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      renderList();
    }

    function renderList(filtered = places) {
      const container = document.getElementById('list');
      container.innerHTML = '';
      filtered.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<b>${p.name}</b> ⭐${p.rating} • ${p.time}<br><button onclick="openMenu(${p.id})" style="width:100%;margin-top:8px;background:#0a0;color:#000;">Browse Menu</button>`;
        container.appendChild(div);
        L.marker([p.lat, p.lng]).addTo(map).bindPopup(p.name).on('click', () => openMenu(p.id));
      });
    }

    function filterItems() {
      const term = document.getElementById('search').value.toLowerCase();
      let filtered = places;
      if (currentCategory !== 'all') filtered = filtered.filter(p => p.type === currentCategory);
      if (term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term) || p.products.some(pr => pr.name.toLowerCase().includes(term)));
      renderList(filtered);
    }

    function toggleCategory(cat) {
      currentCategory = cat;
      filterItems();
    }

    function openMenu(id) {
      currentPlace = places.find(p => p.id === id);
      document.getElementById('selected-name').textContent = currentPlace.name + " Menu";
      switchTab(1);
      renderProducts();
    }

    function renderProducts() {
      const container = document.getElementById('product-list');
      container.innerHTML = '';
      currentPlace.products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${p.img}" style="width:100%;border-radius:8px;"><h4>${p.name} – R${p.price}</h4><p>${p.desc}</p><button onclick="addToCart(${p.id})" style="width:100%;background:#0a0;color:#000;">Add to Cart</button>`;
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const product = currentPlace.products.find(p => p.id === id);
      cart.push({...product, qty:1});
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCart();
      tg.HapticFeedback.impactOccurred("medium");
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      let total = 0;
      const itemsDiv = document.getElementById('cart-items');
      itemsDiv.innerHTML = '';
      cart.forEach((item,i) => {
        total += item.price * item.qty;
        const row = document.createElement('div');
        row.innerHTML = `${item.name} ×${item.qty} – R${item.price*item.qty} <button onclick="removeFromCart(${i})" style="color:red;">Remove</button>`;
        itemsDiv.appendChild(row);
      });
      document.getElementById('cart-total').textContent = total;
    }

    function removeFromCart(i) {
      cart.splice(i,1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCart();
    }

    function checkout() {
      if (!cart.length) return alert("Cart empty!");
      const total = cart.reduce((s,item) => s + item.price*item.qty, 0);
      if (confirm(`Order R${total} now? (Delivery ~15-25 min)`)) {
        alert("✅ Order placed! Real-time tracking below.");
        showTracking();
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
      }
    }

    function showTracking() {
      alert("🚚 Live Tracking:\n• Preparing at restaurant/dispensary\n• Driver picked up\n• On the way – ETA 14 min\n(Full map tracking can be expanded later)");
    }

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[n].classList.add('active');
      if (n === 0 && !map) initMap();
      if (n === 1 && currentPlace) renderProducts();
    }

    // Life Sim (unchanged but integrated)
    function updateStatus() {
      const inv = player.inventory.length ? player.inventory.join(' • ') : 'Start hustling!';
      document.getElementById('status').innerHTML = `Path: ${player.path ? player.path.toUpperCase() : 'Choose destiny'}<br>💰 R${player.money} | Level ${player.level} | Rep ${player.rep}%<br>Inventory: ${inv}`;
      document.getElementById('inventory').innerHTML = `Your gear: ${inv}`;
    }

    function choosePath(p) {
      if (player.path) return alert("Path locked!");
      player.path = p;
      localStorage.setItem('player', JSON.stringify(player));
      updateStatus();
      alert(`Now living the ${p} life!`);
    }

    function randomEvent() {
      if (!player.path) return alert("Choose path first!");
      const isGangster = player.path === 'gangster';
      const events = isGangster ? [{t:"Big sale +R900",m:900},{t:"🚔 Police – pay R300",m:-300,r:-20}] : [{t:"Promotion +R700",m:700}];
      const e = events[Math.floor(Math.random()*events.length)];
      player.money = Math.max(0, player.money + (e.m||0));
      player.rep = Math.max(0, Math.min(100, player.rep + (e.r||0)));
      if (player.money >= 600 && confirm("Buy new ride/house?")) {
        player.money -= 600;
        player.inventory.push(isGangster ? "🚗 Lowrider" : "🏢 Apartment");
      }
      localStorage.setItem('player', JSON.stringify(player));
      updateStatus();
      alert(e.t + " (Police/Judge logic active)");
    }

    // Games
    function showGame(type) {
      const container = document.getElementById('gameContainer');
      if (type === 'brick') {
        container.innerHTML = `<canvas id="gameCanvas" width="320" height="400"></canvas>`;
        const c = document.getElementById('gameCanvas'), ctx = c.getContext('2d');
        let px=120, bx=160, by=300, dx=3, dy=-3, score=0;
        const bricks = []; for(let r=0;r<5;r++)for(let col=0;col<8;col++) bricks.push({x:col*38+10,y:r*20+40,w:35,h:18,vis:true});
        function loop() {
          ctx.clearRect(0,0,320,400);
          ctx.fillStyle='#0f0'; ctx.fillRect(px,370,80,12);
          ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2); ctx.fill();
          bricks.forEach(b=>{if(b.vis)ctx.fillRect(b.x,b.y,b.w,b.h);});
          ctx.fillText('Score: '+score,10,20);
          bx+=dx; by+=dy;
          if(bx<8||bx>312)dx*=-1; if(by<8)dy*=-1;
          if(by>362 && bx>px && bx<px+80) dy*=-1;
          if(by>400){alert('Game Over! Score '+score);return;}
          bricks.forEach(b=>{if(b.vis && bx>b.x && bx<b.x+b.w && by>b.y && by<b.y+b.h){b.vis=false;dy*=-1;score+=10;}});
          requestAnimationFrame(loop);
        }
        c.addEventListener('touchmove', e=>{px = Math.max(0,Math.min(240,e.touches[0].clientX-40));});
        loop();
      } else {
        container.innerHTML = `<p>${type} game ready (tap/expand later)</p>`;
      }
    }

    window.onload = () => {
      updateStatus();
      updateCart();
      tg.MainButton.setText("🍔 Order Now").show().onClick(()=>switchTab(0));
    };
  </script>
</body>
</html>
