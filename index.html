<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WeedEats • UberEats for the Hood</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin:0; font-family:system-ui; background:#111; color:#0f0; }
    h1 { background:#0a0; color:#000; text-align:center; padding:15px; margin:0; }
    nav { position:fixed; bottom:0; width:100%; display:flex; background:#1a1a1a; z-index:100; box-shadow:0 -2px 10px rgba(0,255,0,0.3); }
    nav button { flex:1; padding:14px 8px; background:none; border:none; color:#0f0; font-size:13px; }
    .tab { display:none; padding:15px; padding-bottom:80px; }
    .active { display:block; }
    .card { background:#222; border-radius:12px; padding:12px; margin:10px 0; box-shadow:0 4px 10px rgba(0,255,0,0.2); }
    canvas { display:block; margin:15px auto; border:3px solid #0f0; background:#000; max-width:100%; }
  </style>
</head>
<body>
  <h1>🌿 WeedEats</h1>

  <!-- Tab 0: Discover -->
  <div id="discover" class="tab active">
    <input type="text" id="search" placeholder="🔎 Search dispensaries or products..." style="width:100%; padding:14px; background:#222; color:#0f0; border:none; border-radius:8px;" onkeyup="filterDispensaries()">
    <div id="map" style="height:280px; margin:12px 0; border-radius:12px;"></div>
    <h3>🔥 Hot Deals</h3>
    <div class="card" style="background:#300; color:#ff0;">20% OFF OG Kush – Limited!</div>
    <h3>Nearby Dispensaries</h3>
    <div id="dispensary-list"></div>
  </div>

  <!-- Tab 1: Menu + Cart -->
  <div id="menu" class="tab">
    <h2 id="selected-dispensary" style="margin-top:0;"></h2>
    <div id="product-list"></div>
    <div class="card" style="margin-top:20px;">
      <h3>🛒 Cart (<span id="cart-count">0</span>)</h3>
      <div id="cart-items" style="max-height:280px; overflow-y:auto;"></div>
      <p style="font-size:18px;">Total: R<span id="cart-total">0</span></p>
      <button onclick="checkout()" style="width:100%; padding:16px; background:#0a0; color:#000; font-weight:bold; border:none;">CHECKOUT & ORDER</button>
    </div>
  </div>

  <!-- Tab 2: Games -->
  <div id="games" class="tab">
    <h2>🎮 Mini Games</h2>
    <button onclick="showGame('brick')" style="width:100%; margin:8px 0; padding:14px; background:#222;">🧱 Brick Breaker (fully playable)</button>
    <button onclick="showGame('runner')" style="width:100%; margin:8px 0; padding:14px; background:#222;">🏃 Subway Runner Style</button>
    <button onclick="showGame('word')" style="width:100%; margin:8px 0; padding:14px; background:#222;">📝 Missing Word</button>
    <button onclick="showGame('puzzle')" style="width:100%; margin:8px 0; padding:14px; background:#222;">🧩 Puzzle Match</button>
    <div id="gameContainer" style="margin-top:20px;"></div>
  </div>

  <!-- Tab 3: Life Sim -->
  <div id="life" class="tab">
    <h2>🧬 Gangster or Corporate Life</h2>
    <div id="status" class="card"></div>
    <button onclick="choosePath('gangster')" style="width:100%; padding:14px; margin:8px 0; background:#222;">🚨 Join the Streets – Gangster</button>
    <button onclick="choosePath('corporate')" style="width:100%; padding:14px; margin:8px 0; background:#222;">📚 Study Hard – Corporate</button>
    <button onclick="randomEvent()" style="width:100%; padding:14px; margin:8px 0; background:#f80;">⏳ Next Day / Random Event (Police & Judge included)</button>
    <div id="inventory" class="card"></div>
  </div>

  <nav>
    <button onclick="switchTab(0)">🏠 Discover</button>
    <button onclick="switchTab(1)">🛍️ Menu/Cart</button>
    <button onclick="switchTab(2)">🎮 Games</button>
    <button onclick="switchTab(3)">🧬 My Life</button>
  </nav>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor("#0a0");

    let player = JSON.parse(localStorage.getItem('player')) || { path: null, money: 800, level: 1, rep: 60, inventory: [] };
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentDispensary = null;

    const dispensaries = [
      {id:1, name:"Green Leaf Co", lat:-25.7461, lng:28.1885, rating:4.9, time:"12-22 min",
       products:[{id:101,name:"OG Kush Flower",price:280,desc:"Premium Indica",img:"https://picsum.photos/200?1"},
                 {id:102,name:"Gummy Bears 10pk",price:160,desc:"Mixed THC",img:"https://picsum.photos/200?2"}]},
      {id:2, name:"High Street Buds", lat:-25.755, lng:28.200, rating:4.7, time:"18-28 min",
       products:[{id:201,name:"Blue Dream Hybrid",price:320,desc:"Balanced",img:"https://picsum.photos/200?3"}]}
    ];

    let map;
    function initMap() {
      map = L.map('map').setView([-25.75, 28.19], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      renderDispensaries();
    }

    function renderDispensaries(filtered = dispensaries) {
      const container = document.getElementById('dispensary-list');
      container.innerHTML = '';
      filtered.forEach(d => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<b>${d.name}</b> ⭐${d.rating} • ${d.time}<br><button onclick="openMenu(${d.id})" style="width:100%;margin-top:8px;">Browse Menu →</button>`;
        container.appendChild(div);
        L.marker([d.lat, d.lng]).addTo(map).bindPopup(d.name).on('click', () => openMenu(d.id));
      });
    }

    function filterDispensaries() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = dispensaries.filter(d => d.name.toLowerCase().includes(term) || d.products.some(p => p.name.toLowerCase().includes(term)));
      renderDispensaries(filtered);
    }

    function openMenu(id) {
      currentDispensary = dispensaries.find(d => d.id === id);
      document.getElementById('selected-dispensary').innerHTML = `${currentDispensary.name} <small>Menu</small>`;
      switchTab(1);
      renderProducts();
    }

    function renderProducts() {
      const container = document.getElementById('product-list');
      container.innerHTML = '';
      currentDispensary.products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${p.img}" style="width:100%;border-radius:8px;"><h4>${p.name} – R${p.price}</h4><p>${p.desc}</p><button onclick="addToCart(${p.id})" style="width:100%;background:#0a0;color:#000;">Add to Cart</button>`;
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const product = currentDispensary.products.find(p => p.id === id);
      cart.push({...product, qty:1});
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCart();
      tg.HapticFeedback.impactOccurred("medium");
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
      const itemsDiv = document.getElementById('cart-items');
      itemsDiv.innerHTML = '';
      let total = 0;
      cart.forEach((item, i) => {
        total += item.price * item.qty;
        const row = document.createElement('div');
        row.innerHTML = `${item.name} ×${item.qty} – R${item.price*item.qty} <button onclick="removeFromCart(${i})" style="color:#f00;">Remove</button>`;
        itemsDiv.appendChild(row);
      });
      document.getElementById('cart-total').textContent = total;
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCart();
    }

    function checkout() {
      if (cart.length === 0) return alert("Cart empty!");
      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      if (confirm(`Place order for R${total}?`)) {
        alert("Order placed! 🚚");
        showTracking();
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
      }
    }

    function showTracking() {
      alert("🚚 Order Tracking:\nPreparing...\nDriver on the way\nETA ~15 min\n(Full animated tracking can be added later)");
    }

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[n].classList.add('active');
      if (n === 0 && !map) initMap();
      if (n === 1 && currentDispensary) renderProducts();
    }

    function updateStatus() {
      const inv = player.inventory.length ? player.inventory.join(' • ') : 'Empty';
      document.getElementById('status').innerHTML = `Path: ${player.path ? player.path.toUpperCase() : 'Choose!'}<br>💰 R${player.money} | Level ${player.level} | Rep ${player.rep}%<br>Inventory: ${inv}`;
      document.getElementById('inventory').innerHTML = `Your stuff: ${inv}`;
    }

    function choosePath(p) {
      if (player.path) return alert("Path already chosen!");
      player.path = p;
      localStorage.setItem('player', JSON.stringify(player));
      updateStatus();
      alert(`You chose the ${p} life!`);
    }

    function randomEvent() {
      if (!player.path) return alert("Choose path first!");
      const isGangster = player.path === 'gangster';
      const events = isGangster ? [
        {t:"Big flip! +R900", m:900},
        {t:"🚔 Police raid – pay R300", m:-300, r:-20},
        {t:"Judge warning", r:-10}
      ] : [
        {t:"Promotion +R700", m:700},
        {t:"Bonus +R450", m:450}
      ];
      const e = events[Math.floor(Math.random()*events.length)];
      player.money = Math.max(0, player.money + (e.m||0));
      player.rep = Math.max(0, Math.min(100, player.rep + (e.r||0)));
      if (player.money >= 500 && confirm("Buy item for R500?")) {
        player.money -= 500;
        player.inventory.push(isGangster ? "🚗 Lowrider" : "🏢 Penthouse");
      }
      localStorage.setItem('player', JSON.stringify(player));
      updateStatus();
      alert(e.t);
    }

    function showGame(type) {
      const container = document.getElementById('gameContainer');
      if (type === 'brick') {
        container.innerHTML = `<canvas id="gameCanvas" width="320" height="400"></canvas>`;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let paddleX = 120, ballX = 160, ballY = 300, dx = 3, dy = -3, score = 0;
        const bricks = [];
        for (let r=0; r<5; r++) for (let c=0; c<8; c++) bricks.push({x:c*38+10, y:r*20+40, w:35, h:18, visible:true});
        function draw() {
          ctx.clearRect(0,0,320,400);
          ctx.fillStyle = '#0f0';
          ctx.fillRect(paddleX, 370, 80, 12);
          ctx.beginPath(); ctx.arc(ballX, ballY, 8, 0, Math.PI*2); ctx.fill();
          bricks.forEach(b => { if (b.visible) ctx.fillRect(b.x, b.y, b.w, b.h); });
          ctx.fillText(`Score: ${score}`, 10, 20);
          ballX += dx; ballY += dy;
          if (ballX < 8 || ballX > 312) dx *= -1;
          if (ballY < 8) dy *= -1;
          if (ballY > 362 && ballX > paddleX && ballX < paddleX+80) dy *= -1;
          if (ballY > 400) { alert("Game Over! Score: " + score); return; }
          bricks.forEach(b => {
            if (b.visible && ballX > b.x && ballX < b.x+b.w && ballY > b.y && ballY < b.y+b.h) {
              b.visible = false; dy *= -1; score += 10;
            }
          });
          requestAnimationFrame(draw);
        }
        canvas.addEventListener('touchmove', e => { paddleX = Math.max(0, Math.min(240, e.touches[0].clientX - 40)); });
        draw();
      } else {
        container.innerHTML = `<p>${type} game started (tap to play – expand later)</p>`;
      }
    }

    window.onload = () => {
      updateStatus();
      updateCart();
      tg.MainButton.setText("🌿 Start Ordering").show().onClick(() => switchTab(0));
    };
  </script>
</body>
</html>
